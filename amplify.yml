version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
          env:
            # Backend URL - override in Amplify Console if needed
            - name: NEXT_PUBLIC_BACKEND_URL
              value: https://p4vpzp2mjf.us-east-1.awsapprunner.com
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .npm/**/*
          - node_modules/**/*
