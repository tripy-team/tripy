version: 1
applications:
  - appRoot: frontend
    frontend:
      env:
        NEXT_PUBLIC_BACKEND_URL: https://p4vpzp2mjf.us-east-1.awsapprunner.com
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .npm/**/*
          - node_modules/**/*
