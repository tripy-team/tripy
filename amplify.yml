version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
            - npx prisma generate
            - |
              echo "=== Branch-based environment configuration ==="
              echo "AWS_BRANCH=$AWS_BRANCH"

              if [ "$AWS_BRANCH" = "dev" ]; then
                BACKEND="${NEXT_PUBLIC_BACKEND_URL:-https://vi3dh2q9ic.us-east-1.awsapprunner.com}"
                STRIPE="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_51T6mgQLpzBoX3ffZw5IebJzL3YWEYrACRblbysqlIeDCN1oWpCLmQVwlhfKwMg9Sb8Lo5S60pUw1FDMGpEiqY8sh00Qb8qCUKH}"
              else
                BACKEND="${NEXT_PUBLIC_BACKEND_URL:-https://xezfenhu6t.us-east-1.awsapprunner.com}"
                STRIPE="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_live_51Ry29NLCwmHfiBloGeoO9I3WVNV6vRZWyd7sDhKwllD8jOIxgUjx8OVUTR0WrVHHRxOYh0DRthb9zVUbiR6ZrtJ900UpjHe6R3}"
              fi

              echo "NEXT_PUBLIC_BACKEND_URL=$BACKEND" > .env.production.local
              if [ -n "$STRIPE" ]; then
                echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$STRIPE" >> .env.production.local
              fi

              if [ -n "${DATABASE_URL:-}" ]; then
                echo "DATABASE_URL=$DATABASE_URL" >> .env.production.local
                echo "DATABASE_URL is set (${#DATABASE_URL} chars)"
              else
                echo "WARNING: DATABASE_URL is not set. Set it in Amplify Console > Environment Variables."
              fi
              if [ -n "${JWT_SECRET:-}" ]; then
                echo "JWT_SECRET=$JWT_SECRET" >> .env.production.local
              fi
              if [ -n "${OPENAI_API_KEY:-}" ]; then
                echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production.local
              fi
              if [ -n "${SERPAPI_KEY:-}" ]; then
                echo "SERPAPI_KEY=$SERPAPI_KEY" >> .env.production.local
              fi
              if [ -n "${GOOGLE_MAPS_API_KEY:-}" ]; then
                echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" >> .env.production.local
              fi

              # Cognito (server-side JWT verification)
              if [ -n "${COGNITO_USER_POOL_ID:-}" ]; then
                echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> .env.production.local
              fi
              if [ -n "${COGNITO_REGION:-}" ]; then
                echo "COGNITO_REGION=$COGNITO_REGION" >> .env.production.local
              fi

              # CloudWatch RUM analytics
              if [ -n "${NEXT_PUBLIC_RUM_APP_MONITOR_ID:-}" ]; then
                echo "NEXT_PUBLIC_RUM_APP_MONITOR_ID=$NEXT_PUBLIC_RUM_APP_MONITOR_ID" >> .env.production.local
              fi
              if [ -n "${NEXT_PUBLIC_RUM_IDENTITY_POOL_ID:-}" ]; then
                echo "NEXT_PUBLIC_RUM_IDENTITY_POOL_ID=$NEXT_PUBLIC_RUM_IDENTITY_POOL_ID" >> .env.production.local
              fi
              if [ -n "${NEXT_PUBLIC_RUM_REGION:-}" ]; then
                echo "NEXT_PUBLIC_RUM_REGION=$NEXT_PUBLIC_RUM_REGION" >> .env.production.local
              fi
              if [ -n "${NEXT_PUBLIC_ANALYTICS_ENABLED:-}" ]; then
                echo "NEXT_PUBLIC_ANALYTICS_ENABLED=$NEXT_PUBLIC_ANALYTICS_ENABLED" >> .env.production.local
              fi
              if [ -n "${NEXT_PUBLIC_APP_VERSION:-}" ]; then
                echo "NEXT_PUBLIC_APP_VERSION=$NEXT_PUBLIC_APP_VERSION" >> .env.production.local
              fi

              echo "--- .env.production.local (keys only) ---"
              sed 's/=.*//' .env.production.local || true
              echo "============================="
            - |
              if [ -n "${DATABASE_URL:-}" ]; then
                echo "Running Prisma migrations against production database..."
                npx prisma migrate deploy
              else
                echo "SKIPPING migrations: DATABASE_URL is not set."
              fi
        build:
          commands:
            - rm -rf .next/cache
            - npm run build
            - cp .env.production.local .next/.env.production.local
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
