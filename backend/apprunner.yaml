version: 1.0
runtime: python311

build:
  commands:
    build:
      # App Runner sets WORKDIR to /app/backend in your build logs, so this should be relative.
      # Install Python dependencies HERE, at build time, so they are baked into the
      # image. Doing this at build (instead of pre-run) means each instance cold
      # start no longer reinstalls every dependency — the dominant backend "bake time".
      - chmod +x start.sh
      - python3 --version
      - pip3 install --upgrade pip
      - pip3 install -r requirements.txt

run:
  runtime-version: 3.11
  # No pre-run dependency install: deps are already baked in by the build phase
  # above. Keeping this empty is what makes cold starts fast.

  # Because runtime workdir is also /app/backend in your logs, call start.sh directly
  command: /bin/bash start.sh

  network:
    port: 8000

  env:
    # CORS: Allow frontend origins to access the API
    # Include your Amplify URL, custom domain, and localhost for dev
    - name: CORS_ORIGINS
      value: "https://tripshacker.com,https://www.tripshacker.com,https://main.d10xxnyizd9jlx.amplifyapp.com,http://localhost:3000,http://127.0.0.1:3000"

    - name: USE_SECRETS_MANAGER
      value: "true"
    - name: SECRETS_MANAGER_SECRET_NAME
      value: "tripy/production/api-keys"
    - name: AWS_REGION
      value: us-east-1
    - name: PYTHONPATH
      value: /app/backend
    - name: USERS_TABLE
      value: tripy-users
    - name: TRIPS_TABLE
      value: tripy-trips
    - name: TRIP_MEMBERS_TABLE
      value: tripy-trip-members
    - name: POINTS_TABLE
      value: tripy-points
    - name: DESTINATIONS_TABLE
      value: tripy-destinations
    - name: DESTINATION_VOTES_TABLE
      value: tripy-destination-votes
    - name: ITINERARY_TABLE
      value: tripy-itinerary
    - name: USER_POOL_ID
      value: "us-east-1_zCMCjyTLJ"
    - name: USER_POOL_CLIENT_ID
      value: "2rehpmlssbivmlo6468rcsd0kq"

    # Email / Sharing (required for "Email me this plan" and monitoring verification)
    - name: SES_SENDER_EMAIL
      value: "tripy@traveltripy.com"
    - name: FRONTEND_URL
      value: "https://tripshacker.com"
    - name: SHARE_TOKEN_SECRET
      value: "f58fde766e311a52097be5484dd94e2f5c34b0db56ef74d5e0191fea33a2e1c3"
    - name: CRON_SECRET
      value: "0b440b54a6b07a7b6d8a48c1958fd124a9a33e2e3b3ed4a37bc4c72dc95c0901"

    # Monitoring feature tables
    - name: MONITORING_TABLE_SUBSCRIPTIONS
      value: "tripy-monitoring-subscriptions"
    - name: MONITORING_TABLE_BASELINES
      value: "tripy-monitoring-baselines"
    - name: MONITORING_TABLE_UPDATES
      value: "tripy-monitoring-updates"
    - name: RATE_LIMIT_TABLE
      value: "tripy-rate-limit-counters"

    # SerpAPI (flight/hotel cash pricing, organic search)
    - name: SERPAPI_KEY
      value: "760dbefc74bbc995a203fe6e043dca076eb2b15cac50fc6fdf77df9758764335"

    # AwardTool (award flight search)
    - name: AWARDTOOL_API_KEY
      value: "0363cfd0-ba6a-4302-ba14-9f86186eb0c7"

    # Streaming generation (SSE + SQS)
    - name: GENERATION_QUEUE_URL
      value: ""
    - name: FEATURE_STREAM_GENERATION
      value: "false"
