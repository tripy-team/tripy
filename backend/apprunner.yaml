version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - chmod +x start.sh
run:
  command: /bin/bash /app/backend/start.sh
  network:
    port: 8000
  env:
    - name: AWS_REGION
      value: us-east-1
    - name: PYTHONPATH
      value: /app/backend
    # REQUIRED - DynamoDB Table Names (update these to match your actual table names)
    - name: USERS_TABLE
      value: tripy-users
    - name: TRIPS_TABLE
      value: tripy-trips
    - name: TRIP_MEMBERS_TABLE
      value: tripy-trip-members
    - name: POINTS_TABLE
      value: tripy-points
    - name: DESTINATIONS_TABLE
      value: tripy-destinations
    - name: DESTINATION_VOTES_TABLE
      value: tripy-destination-votes
    - name: ITINERARY_TABLE
      value: tripy-itinerary
    # REQUIRED FOR AUTH - Cognito Configuration
    # Get these from AWS Cognito Console or run: cd backend && ./get_cognito_credentials.sh
    # IMPORTANT: Replace the placeholder values below with your actual Cognito credentials
