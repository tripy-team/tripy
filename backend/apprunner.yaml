version: 1.0
runtime: python3
build:
  commands:
    build:
      - cd backend && pip install --upgrade pip
      - cd backend && pip install -r requirements.txt
run:
  command: sh -c "cd /app/backend/src && export PYTHONPATH=/app/backend/src && python -m uvicorn app:app --host 0.0.0.0 --port 8000"
  network:
    port: 8000
  env:
    - name: AWS_REGION
      value: us-east-1
    - name: PYTHONPATH
      value: /app/backend/src
    # CORS_ORIGINS: Set this in App Runner Console → Environment variables
    # Example: https://your-app.amplifyapp.com,http://localhost:3000
    # Leave unset to allow all origins (not recommended for production)
healthCheck:
  protocol: HTTP
  path: /healthz
  interval: 10
  timeout: 5
  healthyThreshold: 1
  unhealthyThreshold: 5