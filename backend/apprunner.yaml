version: 1.0
runtime: python3
build:
  commands:
    build:
      - python -V
      - python -m venv .venv
      - . .venv/bin/activate
      - pip install --upgrade pip
      - pip install -r requirements.txt
run:
  pre-run:
    - . .venv/bin/activate
    - python -V
  command: ./.venv/bin/uvicorn app:app --host 0.0.0.0 --port $PORT
  network:
    port: 8080
