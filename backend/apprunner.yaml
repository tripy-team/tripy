version: 1.0
runtime: python3
build:
  commands:
    build:
      - cd backend
      - pip install --upgrade pip
      - pip install -r requirements.txt
run:
  command: cd backend && export PYTHONPATH=/app/backend/src:$PYTHONPATH && python -m uvicorn src.app:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: AWS_REGION
      value: us-east-1
    - name: PYTHONPATH
      value: /app/backend/src
