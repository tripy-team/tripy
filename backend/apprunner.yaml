version: 1.0
runtime: python311

build:
  commands:
    build:
      - echo "Build phase (python311): skipping pip installs here"

run:
  runtime-version: 3.11
  pre-run:
    - python3 --version
    - pip3 --version
    - pip3 install --upgrade pip
    - pip3 install -r backend/requirements.txt
    - chmod +x backend/start.sh
  command: /bin/bash backend/start.sh
  network:
    port: 8000
  env:
    - name: AWS_REGION
      value: us-east-1
    - name: PYTHONPATH
      value: /app/backend
