version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - chmod +x start.sh
run:
  command: bash /app/backend/start.sh
  network:
    port: 8000
  env:
    - name: AWS_REGION
      value: us-east-1
    - name: PYTHONPATH
      value: /app/backend
    # CORS_ORIGINS: Set this in App Runner Console → Environment variables
    # Example: https://your-app.amplifyapp.com,http://localhost:3000
    # Leave unset to allow all origins (not recommended for production)
    # Note: Health check is configured in App Runner Console, not in this file