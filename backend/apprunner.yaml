version: 1.0
runtime: python
build:
  commands:
    build:
      - python -V
      - python -m venv .venv
      - . .venv/bin/activate
      - pip install --upgrade pip
      - pip install -r requirements.txt
run:
  pre-run:
    - . .venv/bin/activate
    - python -V
    - pip show boto3 botocore s3transfer || true
  command: ./.venv/bin/uvicorn app:app --host 0.0.0.0 --port 8080
