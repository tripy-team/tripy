version: 1.0
runtime: python311

build:
  commands:
    build:
      # App Runner sets WORKDIR to /app/backend in your build logs, so this should be relative
      - chmod +x start.sh

run:
  runtime-version: 3.11
  pre-run:
    - python3 --version
    - pip3 --version
    - pip3 install --upgrade pip
    - pip3 install -r requirements.txt

  # Because runtime workdir is also /app/backend in your logs, call start.sh directly
  command: /bin/bash start.sh

  network:
    port: 8000

  env:
    # CORS: Allow frontend origins to access the API
    # Include your Amplify URL, custom domain, and localhost for dev
    - name: CORS_ORIGINS
      value: "https://traveltripy.com,https://www.traveltripy.com,https://main.d2p22adloz2lev.amplifyapp.com"

    - name: USE_SECRETS_MANAGER
      value: "true"
    - name: SECRETS_MANAGER_SECRET_NAME
      value: "tripy/production/api-keys"
    - name: AWS_REGION
      value: us-east-1
    - name: PYTHONPATH
      value: /app/backend
    - name: USERS_TABLE
      value: tripy-users
    - name: TRIPS_TABLE
      value: tripy-trips
    - name: TRIP_MEMBERS_TABLE
      value: tripy-trip-members
    - name: POINTS_TABLE
      value: tripy-points
    - name: DESTINATIONS_TABLE
      value: tripy-destinations
    - name: DESTINATION_VOTES_TABLE
      value: tripy-destination-votes
    - name: ITINERARY_TABLE
      value: tripy-itinerary
    - name: USER_POOL_ID
      value: "us-east-1_zCMCjyTLJ"
    - name: USER_POOL_CLIENT_ID
      value: "2rehpmlssbivmlo6468rcsd0kq"

    # Email / Sharing (required for "Email me this plan" and monitoring verification)
    - name: SES_SENDER_EMAIL
      value: "tripy@traveltripy.com"
    - name: FRONTEND_URL
      value: "https://traveltripy.com"

    # Monitoring feature tables
    - name: MONITORING_TABLE_SUBSCRIPTIONS
      value: "tripy-monitoring-subscriptions"
    - name: MONITORING_TABLE_BASELINES
      value: "tripy-monitoring-baselines"
    - name: MONITORING_TABLE_UPDATES
      value: "tripy-monitoring-updates"
    - name: RATE_LIMIT_TABLE
      value: "tripy-rate-limit-counters"
