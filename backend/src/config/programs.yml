# NOTE on hotel -> airline transfers (airline_partners below):
#   These are STRUCTURAL base ratios only (last_verified: 2026-06). Promotional
#   transfer bonuses are NEVER encoded here — they are pulled live by
#   src/services/transfer_bonus_scraper.py (TPG + NerdWallet) and overlaid at
#   compute time. Hotel->airline is almost always value-destroying; it is
#   surfaced only as a top-up to clear an award threshold (see transfer_strategy).
hotels:
  HH:
    name: "Hilton Honors"
    typical_cpp: 0.5
    brands: ["Hilton", "Conrad", "Waldorf Astoria", "DoubleTree", "Hampton Inn", "Embassy Suites"]
    points_per_night_range: [10000, 120000]
    has_surcharge: true
    # Hilton transfers ~10:1 to most airline partners (poor value). last_verified: 2026-06
    airline_partners:
      UA: { ratio: 0.1, transfer_time: "1-2 days" }
      AA: { ratio: 0.1, transfer_time: "1-2 days" }
      VS: { ratio: 0.1, transfer_time: "1-2 days" }
      AF: { ratio: 0.1, transfer_time: "1-2 days" }
      QF: { ratio: 0.1, transfer_time: "1-2 days" }
